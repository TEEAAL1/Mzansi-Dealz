openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MzansiDealz API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: cart
    description: Cart operations
  - name: checkout
    description: Checkout and order operations
  - name: admin
    description: Admin panel operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: on_sale
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, discount_desc]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured/flash sale products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/new-arrivals:
    get:
      operationId: getNewArrivals
      tags: [products]
      summary: Get newest products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: New arrivals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/stats:
    get:
      operationId: getProductStats
      tags: [products]
      summary: Get product statistics summary
      responses:
        "200":
          description: Product stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductStats"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Unauthorized

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized

  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderList"
        "401":
          description: Unauthorized

  /admin/orders/{orderNumber}/status:
    put:
      operationId: updateOrderStatus
      tags: [admin]
      summary: Update order status
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /admin/products:
    post:
      operationId: createProduct
      tags: [admin]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Unauthorized

  /admin/products/{id}:
    put:
      operationId: updateProduct
      tags: [admin]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    delete:
      operationId: deleteProduct
      tags: [admin]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /checkout:
    post:
      operationId: createCheckout
      tags: [checkout]
      summary: Create an order and get PayFast payment data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Order created with PayFast redirect data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Validation error

  /checkout/notify:
    post:
      operationId: handlePayfastNotify
      tags: [checkout]
      summary: PayFast ITN webhook
      responses:
        "200":
          description: OK

  /orders/{orderNumber}:
    get:
      operationId: getOrder
      tags: [checkout]
      summary: Get order by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required:
        - id
        - name
        - slug
        - price
        - originalPrice
        - discountPercent
        - categoryId
        - categoryName
        - imageUrl
        - inStock
        - isFeatured
        - isNewArrival
        - onSale
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        originalPrice:
          type: number
        discountPercent:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        imageUrl:
          type: string
        inStock:
          type: boolean
        stockCount:
          type: ["integer", "null"]
        isFeatured:
          type: boolean
        isNewArrival:
          type: boolean
        onSale:
          type: boolean
        tags:
          type: ["string", "null"]
        createdAt:
          type: string

    ProductList:
      type: object
      required:
        - products
        - total
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer

    Category:
      type: object
      required:
        - id
        - name
        - slug
        - icon
        - productCount
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        productCount:
          type: integer
        description:
          type: ["string", "null"]

    ProductStats:
      type: object
      required:
        - totalProducts
        - totalCategories
        - avgDiscountPercent
        - featuredCount
        - newArrivalsCount
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        avgDiscountPercent:
          type: integer
        featuredCount:
          type: integer
        newArrivalsCount:
          type: integer

    AdminLoginRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminLoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    AdminStats:
      type: object
      required:
        - totalOrders
        - ordersToday
        - totalRevenue
        - revenueToday
        - totalProducts
        - pendingOrders
      properties:
        totalOrders:
          type: integer
        ordersToday:
          type: integer
        totalRevenue:
          type: number
        revenueToday:
          type: number
        totalProducts:
          type: integer
        pendingOrders:
          type: integer

    AdminOrder:
      type: object
      required:
        - id
        - orderNumber
        - customerName
        - customerEmail
        - total
        - status
        - itemCount
        - createdAt
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        total:
          type: number
        status:
          type: string
        itemCount:
          type: integer
        createdAt:
          type: string

    AdminOrderList:
      type: object
      required: [orders, total]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/AdminOrder"
        total:
          type: integer

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string

    CreateProductRequest:
      type: object
      required:
        - name
        - price
        - originalPrice
        - categoryId
        - imageUrl
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
        categoryId:
          type: integer
        imageUrl:
          type: string
        inStock:
          type: boolean
        stockCount:
          type: integer
        isFeatured:
          type: boolean
        isNewArrival:
          type: boolean
        onSale:
          type: boolean
        tags:
          type: string

    CheckoutItem:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
        quantity:
          type: integer

    CheckoutRequest:
      type: object
      required:
        - items
        - customerName
        - customerEmail
        - customerPhone
        - deliveryAddress
        - deliveryCity
        - deliveryProvince
        - deliveryPostalCode
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutItem"
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        deliveryAddress:
          type: string
        deliveryCity:
          type: string
        deliveryProvince:
          type: string
        deliveryPostalCode:
          type: string

    CheckoutResponse:
      type: object
      required:
        - orderNumber
        - total
        - payfastUrl
        - payfastData
      properties:
        orderNumber:
          type: string
        total:
          type: number
        payfastUrl:
          type: string
        payfastData:
          type: object
          additionalProperties:
            type: string

    OrderItem:
      type: object
      required:
        - id
        - productId
        - productName
        - productImageUrl
        - price
        - quantity
        - subtotal
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productImageUrl:
          type: string
        price:
          type: number
        quantity:
          type: integer
        subtotal:
          type: number

    OrderDetail:
      type: object
      required:
        - id
        - orderNumber
        - customerName
        - customerEmail
        - customerPhone
        - deliveryAddress
        - deliveryCity
        - deliveryProvince
        - deliveryPostalCode
        - subtotal
        - deliveryFee
        - total
        - status
        - items
        - createdAt
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        deliveryAddress:
          type: string
        deliveryCity:
          type: string
        deliveryProvince:
          type: string
        deliveryPostalCode:
          type: string
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
        status:
          type: string
        payfastPaymentId:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
